round = 0

store-count = 100
region-count = 8159500

replica = 3
extra-peer-count = 0
extra-peer-ratio = 0.0
extra-peer-role = "learner"

region-heartbeat-qps = 0
store-heartbeat-qps = 10
report-min-resolved-ts-qps = 99
report-buckets-streams = 100
report-buckets-interval-ms = 1000

leader-update-ratio = 0.0
epoch-update-ratio = 0.0
space-update-ratio = 0.0
flow-update-ratio = 0.0
no-update-ratio = 0.0

sample = false

# v2.1 (2026-05-20) content-fidelity knobs. Required to push PD leader live heap into the
# line-cluster 25-40 GB range and trigger lease keepalive starvation warn. See design doc
# §2.4 + workflow doc §19 (project big-pd-pressure) for the diagnostic chain.

# Initial region content. TiKV defaults are 96 MiB / ~1M keys; matching those makes PD's
# RegionInfo carry realistic bytes per region. Leaving these at 0 (or omitting) keeps the
# legacy 128B / 8keys placeholder behaviour and PD heap will not reach the line target.
region-approximate-size-mib = 96
region-approximate-keys = 1000000

# Hot region marking. HotRegionRatio = 0.05 means 5% of regions are flagged hot at init;
# when those regions are in the updateFlow set, the heartbeat uses the per-region traffic
# values below. Drives PD HotPeerCache / LabelStatistics long-lived heap. Composable with
# the legacy hot-store-count mechanism (set both to test either path independently).
hot-region-ratio = 0.05
hot-write-bytes-per-region = 16000000
hot-read-bytes-per-region = 2000000
hot-write-keys-per-region = 50000
hot-read-keys-per-region = 10000

# Per-store capacity. 0 = auto-compute as 2 * RegionCount * Replica * region size /
# StoreCount, with the legacy 4 TiB as floor. Must scale with region-approximate-size-mib
# so store.Available doesn't underflow on the heartbeat reduction path.
store-capacity-gib = 0

# Bucket-vs-heartbeat race fix. true (default) makes ReportBuckets workers wait for the
# first heartbeat round to finish before sending; false reproduces the legacy race that
# made PD drop ~6,100 buckets in the 5/18 run with `store of the bucket in region is not
# found`. Leave true unless explicitly studying the race.
buckets-after-first-heartbeat-round = true

# v2.3 (2026-05-20) smooth pacing. When true, each per-store worker spreads its region
# heartbeat sends uniformly across the outer-tick window (per-region delay =
# outer_tick / regions_for_store, with ±10% jitter so 100 stores don't sync-burst).
# Per-region cadence stays unchanged (still 60s = regionReportInterval) — only the
# arrival distribution at PD changes from "59s idle + 1s burst" to "steady ~136k/s".
# Set true to match online TiKV's uniform delivery and to stay in workflow §20.6's
# reproduction envelope (leader CPU 8-15 cores, mark phase 3-5s).
# Do NOT also raise region-heartbeat-qps "to smooth more" — that changes the
# per-region cadence away from online (5/20 v2 misstep).
smooth-heartbeat-pacing = false

# v2.4 (2026-05-20) stagger-burst. When true, each per-store worker delays its first
# round by (store_id - 1) * outer_tick / StoreCount so 100 stores enter their
# steady cadence with even phase offsets. Composes with smooth-heartbeat-pacing —
# v3.1 reduced this to a one-shot startup offset (workers' own tickers carry the
# phase forward), so it is no longer mutually exclusive with smooth-pacing or
# burst-cycle.
stagger-burst = false

# v2.5 (2026-05-20) collective burst-cycle. Overlays a wall-clock-phase-aware
# fraction on each per-tick region count to reproduce the 10-minute HIGH/LOW cycle
# observed on online cluster 10989049060142230334. Requires smooth-heartbeat-pacing
# = true (the variable per-tick count must be spread across the tick window).
# Defaults match the online cycle: 60 s HIGH (60 % of leader regions), 420 s LOW
# (31 %), 60 s linear ramp each side.
burst-cycle = false
burst-cycle-period-sec = 600
burst-cycle-high-sec = 60
burst-cycle-ramp-sec = 60
burst-cycle-high-fraction = 0.60
burst-cycle-low-fraction = 0.31

# v3.1 (2026-05-21) service discovery + leader-aware reconnect.
#
# auto-reconnect: when a per-store RegionHeartbeat stream errors (typically PD
# closing it during leader transfer), discover the new PD leader via GetMembers
# across all --pd-endpoints entries and rebuild the underlying gRPC connection.
# Without this, the bench would silently stop heartbeating that store after the
# first leader transfer.
auto-reconnect = true

# full-resend-on-reconnect: immediately after auto-reconnect rebuilds a stream,
# burst-send a heartbeat for EVERY region this store leads (no burst-cycle
# fraction, no per-region pacing). Models real TiKV behaviour — on PD reconnect
# TiKV fires a full heartbeat round before resuming normal cadence — and drives
# the post-stepdown ingress spike we observe on the line cluster. The worker
# runs this round immediately (kicked through slot.kickCh) instead of waiting
# up to a full tickInterval. Requires auto-reconnect = true.
full-resend-on-reconnect = true
